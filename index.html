<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>متجري</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#26302A;
    --cream:#FBF8F2;
    --card:#FFFFFF;
    --line:#E5E0D3;
    --forest:#1E4638;
    --forest-dark:#123027;
    --gold:#C7972B;
    --gold-soft:#F3E6C3;
    --danger:#B5453A;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'IBM Plex Sans Arabic', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Tajawal', sans-serif; }

  header{
    position:sticky; top:0; z-index:40;
    background:var(--forest);
    color:#fff;
    padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
  }
  .brand{
    font-family:'Tajawal', sans-serif;
    font-weight:900;
    font-size:22px;
    letter-spacing:.5px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{color:var(--gold);}
  #cartBtn{
    position:relative;
    background:var(--gold);
    color:var(--forest-dark);
    border:none;
    border-radius:999px;
    padding:10px 18px;
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    display:flex; align-items:center; gap:8px;
    transition:transform .15s ease;
  }
  #cartBtn:active{transform:scale(.96);}
  #cartCount{
    background:var(--forest-dark);
    color:#fff;
    border-radius:999px;
    min-width:20px; height:20px;
    font-size:12px;
    display:flex; align-items:center; justify-content:center;
    padding:0 5px;
  }

  .hero{ padding:38px 20px 26px; text-align:center; }
  .hero h1{
    font-size:clamp(24px,4vw,34px);
    font-weight:900;
    margin:0 0 6px;
    color:var(--forest-dark);
  }
  .hero p{ margin:0; color:#6B6558; font-size:15px; }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(210px,1fr));
    gap:20px;
    padding:10px 20px 60px;
    max-width:1200px;
    margin:0 auto;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    display:flex; flex-direction:column;
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .card:hover{
    box-shadow:0 14px 30px -12px rgba(30,70,56,.28);
    transform:translateY(-3px);
  }
  .card .imgwrap{ aspect-ratio:1/1; background:#F1EDE1; overflow:hidden; }
  .card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .info{ padding:14px 14px 16px; display:flex; flex-direction:column; gap:8px; flex:1; }
  .card h3{ margin:0; font-size:16px; font-weight:700; line-height:1.4; }
  .price-tag{
    display:inline-flex; align-items:center; gap:6px; align-self:flex-start;
    background:var(--gold-soft); color:var(--forest-dark);
    font-weight:700; font-size:14px; padding:4px 10px; border-radius:8px;
  }
  .price-tag::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--gold); }
  .add-btn{
    margin-top:auto; background:var(--forest); color:#fff; border:none;
    border-radius:9px; padding:10px; font-family:'Tajawal', sans-serif;
    font-weight:700; font-size:14px; cursor:pointer; transition:background .15s ease;
  }
  .add-btn:hover{background:var(--forest-dark);}
  .add-btn.added{background:var(--gold); color:var(--forest-dark);}

  .empty, .loading{ text-align:center; color:#8A8374; padding:60px 20px; grid-column:1/-1; }

  .overlay{
    position:fixed; inset:0; background:rgba(20,25,20,.45);
    opacity:0; pointer-events:none; transition:opacity .25s ease; z-index:50;
  }
  .overlay.show{opacity:1; pointer-events:auto;}

  .drawer{
    position:fixed; top:0; bottom:0; left:0; width:min(380px, 92vw);
    background:var(--cream); z-index:60; transform:translateX(-105%);
    transition:transform .3s ease; display:flex; flex-direction:column;
    box-shadow:8px 0 30px rgba(0,0,0,.15);
  }
  .drawer.show{transform:translateX(0);}
  .drawer-head{
    padding:18px 20px; background:var(--forest); color:#fff;
    display:flex; align-items:center; justify-content:space-between;
  }
  .drawer-head h2{margin:0; font-size:18px;}
  .drawer-head button{ background:none; border:none; color:#fff; font-size:20px; cursor:pointer; }
  .drawer-body{ flex:1; overflow-y:auto; padding:14px 18px; }
  .cart-item{
    display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line);
  }
  .cart-item img{ width:52px; height:52px; border-radius:8px; object-fit:cover; background:#eee; }
  .cart-item .meta{flex:1;}
  .cart-item .meta h4{margin:0 0 3px; font-size:14px;}
  .cart-item .meta span{font-size:13px; color:#8A8374;}
  .qty{ display:flex; align-items:center; gap:8px; }
  .qty button{
    width:24px; height:24px; border-radius:6px; border:1px solid var(--line);
    background:#fff; cursor:pointer; font-size:14px; line-height:1;
  }
  .remove-btn{ background:none; border:none; color:var(--danger); font-size:13px; cursor:pointer; margin-right:4px; }

  .drawer-foot{ padding:16px 18px 20px; border-top:1px solid var(--line); background:#fff; }
  .total-row{
    display:flex; justify-content:space-between; font-family:'Tajawal', sans-serif;
    font-weight:700; font-size:17px; margin-bottom:12px;
  }
  .field{ margin-bottom:10px; }
  .field label{ display:block; font-size:13px; color:#6B6558; margin-bottom:5px; }
  .field input{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px;
    font-family:inherit; font-size:14px; background:var(--cream);
  }
  .field input:focus{ outline:none; border-color:var(--forest); }
  .checkout-btn{
    width:100%; background:var(--gold); color:var(--forest-dark); border:none;
    padding:13px; border-radius:9px; font-family:'Tajawal', sans-serif;
    font-weight:900; font-size:15px; cursor:pointer; margin-top:4px;
  }
  .checkout-btn:disabled{opacity:.55; cursor:not-allowed;}
  .msg{ font-size:13px; text-align:center; margin-top:8px; }
  .msg.ok{color:var(--forest);}
  .msg.err{color:var(--danger);}

  @media (max-width:480px){
    .grid{grid-template-columns:repeat(2,1fr); gap:12px; padding:10px 12px 50px;}
    .brand{font-size:18px;}
  }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="dot">●</span> متجري</div>
  <button id="cartBtn" onclick="openCart()">🛒 السلة <span id="cartCount">0</span></button>
</header>

<section class="hero">
  <h1>تسوّق منتجاتنا المختارة بعناية</h1>
  <p>اختار اللي يعجبك، وسجّل اسمك ورقم تليفونك، وهنتواصل معاك لتأكيد الطلب</p>
</section>

<div class="grid" id="grid">
  <div class="loading">جاري تحميل المنتجات...</div>
</div>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h2>سلة المشتريات</h2>
    <button onclick="closeCart()">✕</button>
  </div>
  <div class="drawer-body" id="cartBody">
    <p style="color:#8A8374; text-align:center; margin-top:30px;">السلة فاضية</p>
  </div>
  <div class="drawer-foot">
    <div class="total-row"><span>الإجمالي</span><span id="totalPrice">0 ج.م</span></div>
    <div class="field">
      <label>الاسم بالكامل</label>
      <input type="text" id="custName" placeholder="اكتب اسمك">
    </div>
    <div class="field">
      <label>رقم التليفون</label>
      <input type="tel" id="custPhone" placeholder="01xxxxxxxxx">
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="submitOrderNow()">تأكيد الطلب</button>
    <div class="msg" id="orderMsg"></div>
  </div>
</div>

<script>
  /* ====== حط هنا رابط الـ Apps Script بتاعك (لازم ينتهي بـ /exec) ====== */
  const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";
  /* ==================================================================== */

  let PRODUCTS = [];
  let CART = {};

  function loadProducts(){
    fetch(API_URL)
      .then(r => r.json())
      .then(data => {
        if(data.success) renderProducts(data.products);
        else showLoadError();
      })
      .catch(showLoadError);
  }

  function showLoadError(){
    document.getElementById('grid').innerHTML =
      '<div class="empty">تعذّر تحميل المنتجات، تأكد من رابط API وإعداد شيت "Products".</div>';
  }

  function renderProducts(products){
    PRODUCTS = products;
    const grid = document.getElementById('grid');
    if(!products.length){
      grid.innerHTML = '<div class="empty">لا توجد منتجات بعد. أضف صفوف في شيت Products.</div>';
      return;
    }
    grid.innerHTML = products.map(p => `
      <div class="card">
        <div class="imgwrap">
          <img src="${p.image || 'https://via.placeholder.com/400x400?text=%D9%84%D8%A7+%D8%AA%D9%88%D8%AC%D8%AF+%D8%B5%D9%88%D8%B1%D8%A9'}" alt="${p.name}">
        </div>
        <div class="info">
          <h3>${p.name}</h3>
          <span class="price-tag">${p.price} ج.م</span>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">أضف للسلة</button>
        </div>
      </div>
    `).join('');
  }

  function addToCart(id){
    const p = PRODUCTS.find(x => x.id === id);
    if(!p) return;
    if(CART[id]) CART[id].qty += 1;
    else CART[id] = { name:p.name, price:p.price, image:p.image, qty:1 };

    const btn = document.getElementById('btn-'+id);
    btn.textContent = 'تمت الإضافة ✓';
    btn.classList.add('added');
    setTimeout(()=>{ btn.textContent='أضف للسلة'; btn.classList.remove('added'); }, 900);

    renderCart();
  }

  function changeQty(id, delta){
    if(!CART[id]) return;
    CART[id].qty += delta;
    if(CART[id].qty <= 0) delete CART[id];
    renderCart();
  }

  function removeItem(id){
    delete CART[id];
    renderCart();
  }

  function renderCart(){
    const ids = Object.keys(CART);
    const body = document.getElementById('cartBody');
    let count = 0, total = 0;

    if(!ids.length){
      body.innerHTML = '<p style="color:#8A8374; text-align:center; margin-top:30px;">السلة فاضية</p>';
    } else {
      body.innerHTML = ids.map(id => {
        const it = CART[id];
        count += it.qty;
        total += it.qty * it.price;
        return `
          <div class="cart-item">
            <img src="${it.image || ''}" onerror="this.style.visibility='hidden'">
            <div class="meta">
              <h4>${it.name}</h4>
              <span>${it.price} ج.م</span>
            </div>
            <div class="qty">
              <button onclick="changeQty(${id},-1)">−</button>
              <span>${it.qty}</span>
              <button onclick="changeQty(${id},1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${id})">حذف</button>
          </div>
        `;
      }).join('');
    }
    document.getElementById('cartCount').textContent = count;
    document.getElementById('totalPrice').textContent = total + ' ج.م';
    return total;
  }

  function openCart(){
    document.getElementById('drawer').classList.add('show');
    document.getElementById('overlay').classList.add('show');
  }
  function closeCart(){
    document.getElementById('drawer').classList.remove('show');
    document.getElementById('overlay').classList.remove('show');
  }

  function submitOrderNow(){
    const name = document.getElementById('custName').value.trim();
    const phone = document.getElementById('custPhone').value.trim();
    const msg = document.getElementById('orderMsg');
    const ids = Object.keys(CART);

    msg.textContent = '';
    msg.className = 'msg';

    if(!ids.length){ msg.textContent='السلة فاضية، اختار منتج الأول'; msg.className='msg err'; return; }
    if(!name){ msg.textContent='من فضلك اكتب اسمك'; msg.className='msg err'; return; }
    if(!phone || phone.length < 8){ msg.textContent='من فضلك اكتب رقم تليفون صحيح'; msg.className='msg err'; return; }

    const items = ids.map(id => ({ name:CART[id].name, price:CART[id].price, qty:CART[id].qty }));
    const total = items.reduce((s,it)=> s + it.price*it.qty, 0);

    const btn = document.getElementById('checkoutBtn');
    btn.disabled = true;
    btn.textContent = 'جاري إرسال الطلب...';

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // بيتجنب preflight CORS
      body: JSON.stringify({ name, phone, items, total })
    })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        btn.textContent = 'تأكيد الطلب';
        if(data.success){
          msg.textContent = 'تم إرسال طلبك بنجاح، هنتواصل معاك قريبًا 🌿';
          msg.className = 'msg ok';
          CART = {};
          renderCart();
          document.getElementById('custName').value='';
          document.getElementById('custPhone').value='';
        } else {
          msg.textContent = 'حصل خطأ، حاول تاني';
          msg.className = 'msg err';
        }
      })
      .catch(()=>{
        btn.disabled = false;
        btn.textContent = 'تأكيد الطلب';
        msg.textContent = 'حصل خطأ في الاتصال، حاول تاني';
        msg.className = 'msg err';
      });
  }

  loadProducts();
</script>
</body>
</html>
